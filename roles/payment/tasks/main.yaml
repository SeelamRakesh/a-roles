- name: App_setup
  ansible.builtin.import_role:
    name : common
    tasks_from: app_setup.yaml

- name: python_setup
  ansible.builtin.import_role:
    name : common
    tasks_from: python_setup.yaml

- name: Systemd_setup
  ansible.builtin.import_role:
    name : common
    tasks_from: systemd_setup.yaml

- name: Restart payment service
  ansible.builtin.service:
    name: "{{ component }}"
    state: restarted
    enabled: yes