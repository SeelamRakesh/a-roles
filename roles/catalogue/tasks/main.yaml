- name: App_setup
  ansible.builtin.import_tasks:
    file: app_setup.yaml
    tasks_from: common

- name: Nodejs_setup
  ansible.builtin.import_tasks:
    file: nodejs_setup.yaml
    tasks_from: common

- name: Systemd_setup
  ansible.builtin.import_tasks:
    file: systemd_setup.yaml
    tasks_from: common

- name: Copy mongo repo
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: Install Mongodb client
  ansible.builtin.dnf:
   name: mongodb-mongosh
   state: present

- name: check products loaded
  ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output

- name: Load master data
  ansible.builtin.shell: mongosh --host {{ MONGODB_HOST }} </app/db/master-data.js
  when: catalogue_output.std_out | int < 0

- name: Restart catalogue service
  ansible.builtin.service:
    name: catalogue
    state: restarted
    enabled: yes