- name: App_setup
  ansible.builtin.import_role:
    name : common
    tasks_from: app_setup.yaml

- name: Nodejs_setup
  ansible.builtin.import_role:
    name : common
    tasks_from: nodejs_setup.yaml

- name: Systemd_setup
  ansible.builtin.import_role:
    name : common
    tasks_from: systemd_setup.yaml

- name: Restart User service
  ansible.builtin.service:
    name: user
    state: restarted
    enabled: yes