- name: Create a system user
  ansible.builtin.user:
    name: roboshop
    comment: "System user Roboshop"
    system: true
    shell: /sbin/nologin
    home: /app
    state: present

- name: delete app directory
  ansible.builtin.file:
    path: /app
    state: absent

- name: Create a app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: delete {{ component }} zip file
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent

- name: Download {{ component }} code
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip

- name: Unzip {{ component }} code
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes